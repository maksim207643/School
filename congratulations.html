<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравляем!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        .celebration {
            animation: bounce 2s infinite;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .message {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .user-name {
            font-weight: bold;
            color: #e74c3c;
            font-size: 22px;
        }

        .result {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: 30px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .correct-answer {
            color: #27ae60;
            font-weight: bold;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            opacity: 0.7;
            animation: fall 5s linear forwards;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        @keyframes fall {
            0% {
                top: -10px;
            }
            100% {
                top: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="celebration">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="#FFD700"/>
                <text x="50" y="60" text-anchor="middle" font-size="60" fill="#FFFFFF">🎉</text>
            </svg>
        </div>

        <h1>Поздравляем с прохождением вопроса!</h1>

        <div class="message">
            Отлично справились! Вы успешно ответили на вопрос.
            <br>
            Добро пожаловать на следующий этап!
        </div>

        <div class="result">
            <p>Ваш ответ был <span class="correct-answer">правильным</span>!</p>
            <p>Вы молодец, <span class="user-name" id="userName">Пользователь</span>!</p>
        </div>

        <button onclick="goToNext()">Продолжить</button>
    </div>

    <script>
        // Получаем имя пользователя из localStorage (если доступно)
        const username = localStorage.getItem('currentUser') || 'Пользователь';
        document.getElementById('userName').textContent = username;

        // Функция для перехода на следующую страницу
        function goToNext() {
            // Здесь можно указать URL следующей страницы
            // Например: window.location.href = 'next-page.html';
            alert('Переход к следующему этапу!');
            // Раскомментируйте строку ниже и укажите нужный URL
            // window.location.href = 'следующий-адрес-страницы.html';
        }

        // Создаём конфетти (визуальный эффект)
        function createConfetti() {
            const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(confetti);

                // Удаляем конфетти после анимации
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }

        // Запускаем эффект конфетти при загрузке страницы
        window.onload = createConfetti;
    </script>
</body>
</html>
